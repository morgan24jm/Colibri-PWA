name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # =========================
      # BACKEND
      # =========================
      - name: Install backend dependencies
        working-directory: Backend
        run: npm install

      # =========================
      # FRONTEND
      # =========================
      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm install

      - name: Build frontend
        working-directory: Frontend
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          VITE_ENVIRONMENT: ${{ secrets.VITE_ENVIRONMENT }}
          VITE_RIDE_TIMEOUT: ${{ secrets.VITE_RIDE_TIMEOUT }}
        run: npm run build

  # =========================
  # SONARQUBE ANALYSIS
  # =========================
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-gestion-sw
            -Dsonar.sources=Backend,Frontend

  # =========================
  # K6 LOAD TESTS (LOCALHOST)
  # =========================
  k6-load-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout c�digo
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install backend dependencies
        working-directory: Backend
        run: npm install

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm install

      - name: Start backend (localhost)
        working-directory: Backend
        env:
          PORT: ${{ secrets.PORT }}
          RELOAD_INTERVAL: ${{ secrets.RELOAD_INTERVAL }}
          SERVER_URL: ${{ secrets.SERVER_URL }}
          CLIENT_URL: ${{ secrets.CLIENT_URL }}
          ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
          MONGODB_DEV_URL: ${{ secrets.MONGODB_DEV_URL }}
          MONGODB_PROD_URL: ${{ secrets.MONGODB_PROD_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_MAPS_API: ${{ secrets.GOOGLE_MAPS_API }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
        run: |
          node server.js > server.log 2>&1 &

      - name: Start frontend (localhost)
        working-directory: Frontend
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          VITE_ENVIRONMENT: ${{ secrets.VITE_ENVIRONMENT }}
          VITE_RIDE_TIMEOUT: ${{ secrets.VITE_RIDE_TIMEOUT }}
        run: |
          npm run dev -- --host 0.0.0.0 --port 5173 > frontend.log 2>&1 &

      - name: Wait for backend
        env:
          PORT: ${{ secrets.PORT }}
        run: |
          for i in {1..30}; do
            PORT_TO_USE="${PORT:-3000}"
            if curl -sSf "http://localhost:${PORT_TO_USE}/" >/dev/null; then
              echo "Backend ready";
              exit 0;
            fi
            sleep 2;
          done
          echo "Backend did not start in time";
          cat Backend/server.log || true;
          exit 1

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -sSf "http://localhost:5173/" >/dev/null; then
              echo "Frontend ready";
              exit 0;
            fi
            sleep 2;
          done
          echo "Frontend did not start in time";
          cat Frontend/frontend.log || true;
          exit 1

      - name: Instalar K6
        uses: grafana/setup-k6-action@v1

      - name: Ejecutar pruebas de carga K6 (localhost)
        env:
          PORT: ${{ secrets.PORT }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          RIDER_EMAIL: ${{ secrets.RIDER_EMAIL }}
          RIDER_PASSWORD: ${{ secrets.RIDER_PASSWORD }}
          RUN_MAPS: ${{ secrets.RUN_MAPS }}
          RUN_RIDE: ${{ secrets.RUN_RIDE }}
        run: |
          PORT_TO_USE="${PORT:-3000}"
          BASE_URL="http://localhost:${PORT_TO_USE}" \
            k6 run --summary-export k6-summary.json Backend/test/load-test.js

      - name: Subir resultados como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: k6-summary.json
